name: Feature Request
description: 提议 PrismGo 的新能力或改进
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你希望 PrismGo 在什么开发场景中解决什么问题？
      placeholder: 描述当前工作流、痛点和受影响的使用者。
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: 目标 API 或行为
      description: 如果你已经有期望的调用方式、配置格式或命令，请写出来。
      render: go

  - type: textarea
    id: dx
    attributes:
      label: 开发体验
      description: 这个改动应该如何让项目初始化、调试、测试或部署更顺畅？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 目前可以怎样绕过？为什么还需要在 PrismGo 中支持？

  - type: dropdown
    id: compatibility
    attributes:
      label: 兼容性影响
      description: 这个提议是否可能改变现有 API、配置或运行时行为？
      options:
        - 不影响兼容性
        - 可能需要兼容层
        - 可能包含破坏性变更
        - 不确定
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 其他上下文
      description: 相关链接、示例、约束或你愿意补充的背景。
