name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go:
          - 1.25.x
          - 1.26.x

    steps:
      - name: Clear inherited GitHub auth headers
        run: git config --global --unset-all http.https://github.com/.extraheader || true

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Update PrismGo framework dependency
        run: |
          go mod edit -droprequire=github.com/prismgo/framework
          go get github.com/prismgo/framework@latest

      - name: Tidy modules
        run: go mod tidy

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
