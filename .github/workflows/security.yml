name: Security

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: http.https://github.com/.extraheader
          GIT_CONFIG_VALUE_0: ""
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./...
