name: Security

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
          cache: true

      - name: Update PrismGo framework dependency
        run: go get github.com/prismgo/framework@latest

      - name: Tidy modules
        run: go mod tidy

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./...
