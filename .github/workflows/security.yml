name: Security

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: http.https://github.com/.extraheader
          GIT_CONFIG_VALUE_0: ""
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./...
          # Pin to Go 1.25 to avoid a panic in govulncheck v1.4.0 + tools v0.46.0
          # when run with Go 1.26+ (ForEachElement called on type containing *types.TypeParam).
          # See https://github.com/golang/tools/pull/652
          go-version-input: '1.25'
