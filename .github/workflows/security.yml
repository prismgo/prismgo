name: Security

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: http.https://github.com/.extraheader
          GIT_CONFIG_VALUE_0: ""
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: true

      - name: Run govulncheck
        env:
          GOBIN: /tmp/.bin
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          /tmp/.bin/govulncheck -C . -format text ./...
