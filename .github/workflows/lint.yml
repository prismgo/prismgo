name: Lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - name: Clear inherited GitHub auth headers
        run: git config --global --unset-all http.https://github.com/.extraheader || true

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
          cache: true

      - name: Update PrismGo framework dependency
        run: |
          go mod edit -droprequire=github.com/prismgo/framework
          go get github.com/prismgo/framework@latest

      - name: Tidy modules
        run: go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
